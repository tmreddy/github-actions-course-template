name: GIPHY generator

on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, edited]
  issue_comments: 
    types: [created, edited]
    
jobs:
  giphy-generated:
    runs-on: ubuntu-latest
    
    steps: 
      - name: GIPHY Generator
        uses: IAmHughes/giphy-generator@v1.0.0
        
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIPHY_TOKEN: ${{ secrets.GIPHY_TOKEN }}
        with:
          rating: 'g'
          lang: 'en'
